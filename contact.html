<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact - Annadatri</title>
  <link
    href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    rel="stylesheet"
  />
  <style>
    :root {
      --primary-color: #0d6153;
      --secondary-color: #f5c242;
      --light-bg: #f5f5f5;
      --text-color: #333;
      --white: #fff;
    }
    body {
      background-color: var(--light-bg);
      color: var(--text-color);
    }
    .fade-in {
      animation: fadeIn 2s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .bg-primary {
      background-color: var(--primary-color);
    }
    .bg-secondary {
      background-color: var(--secondary-color);
    }
    .text-primary {
      color: var(--primary-color);
    }
    .text-secondary {
      color: var(--secondary-color);
    }
    .border-primary {
      border-color: var(--primary-color);
    }
    .hover\:bg-secondary:hover {
      background-color: var(--secondary-color);
    }
    .hover\:text-primary:hover {
      color: var(--primary-color);
    }
  </style>
</head>
<body class="font-sans">

  <!-- Header -->
 <!-- Header -->
<div class="bg-white shadow-md mx-auto max-w-4xl fade-in relative">
  <div class="flex justify-between items-center px-6 py-4 border-b border-primary">
    <div class="flex items-center">
      <span class="text-xl font-bold text-primary">ANNADATRI</span>
    </div>
    <!-- Hamburger Menu Icon -->
    <button id="menu-toggle" class="text-primary hover:text-secondary focus:outline-none md:hidden">
      <i class="fas fa-bars fa-2x"></i>
    </button>
    <!-- Navigation Menu (desktop) -->
    <nav id="nav-menu" class="hidden md:flex space-x-6">
      <a href="index.html" class="text-text-color hover:text-primary">Home</a>
      <a href="contact.html" class="text-text-color hover:text-primary">Contact</a>
    </nav>
  </div>
  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-white shadow-md md:hidden z-10">
    <a href="index.html" class="block px-6 py-3 text-primary border-b border-primary">Home</a>
    <a href="contact.html" class="block px-6 py-3 text-primary">Contact</a>
  </div>
  <!-- Contact Section -->
  <div class="px-6 py-12 max-w-4xl mx-auto">
    <h2 class="text-4xl font-bold text-primary text-center fade-in mb-8">CONTACT ANNADATRI</h2>
    <div class="flex flex-col md:flex-row items-center md:items-start">
      
      <!-- Contact Info -->
      <div class="md:w-1/3 text-center md:text-left space-y-6">
        <p class="text-text-color">Reach out to us via any of these channels:</p>
        <div>
          <a href="mailto:pxrple6@gmail.com" class="text-primary hover:text-secondary flex flex-col items-center md:items-start space-y-1">
            <i class="fas fa-envelope fa-2x"></i>
            <span>Email</span>
          </a>
        </div>
        <div>
          <a href="https://www.instagram.com/garganusha_" target="_blank" class="text-primary hover:text-secondary flex flex-col items-center md:items-start space-y-1">
            <i class="fab fa-instagram fa-2x"></i>
            <span>Instagram</span>
          </a>
        </div>
        <div>
          <a href="https://www.linkedin.com/in/yourusername" target="_blank" class="text-primary hover:text-secondary flex flex-col items-center md:items-start space-y-1">
            <i class="fab fa-linkedin fa-2x"></i>
            <span>LinkedIn</span>
          </a>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="md:w-2/3 mt-8 md:mt-0 md:pl-12 w-full">
        <form action="mailto:pxrple6@gmail.com" method="post" enctype="text/plain" class="bg-white p-6 rounded shadow">
          <div class="mb-4">
            <label for="name" class="block text-text-color font-semibold mb-2">Name</label>
            <input type="text" id="name" name="name" required class="w-full p-2 border border-gray-300 rounded" />
          </div>
          <div class="mb-4">
            <label for="email" class="block text-text-color font-semibold mb-2">Email</label>
            <input type="email" id="email" name="email" required class="w-full p-2 border border-gray-300 rounded" />
          </div>
          <div class="mb-4">
            <label for="message" class="block text-text-color font-semibold mb-2">Message</label>
            <textarea id="message" name="message" rows="5" required class="w-full p-2 border border-gray-300 rounded"></textarea>
          </div>
          <button type="submit" class="w-full bg-primary text-white py-2 rounded hover:bg-secondary hover:text-primary transition">
            Send Message
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-primary text-white text-center py-4 fade-in">
    &copy; 2025 Annadatri | Powered by anushagarg.com
  </footer>

  <script>
    const menuToggle = document.getElementById("menu-toggle");
    const mobileMenu = document.getElementById("mobile-menu");

    menuToggle.addEventListener("click", () => {
      mobileMenu.classList.toggle("hidden");
    });

    document.addEventListener("click", (event) => {
      if (!menuToggle.contains(event.target) && !mobileMenu.contains(event.target)) {
        mobileMenu.classList.add("hidden");
      }
    });  const menuToggle = document.getElementById("menu-toggle");
  const mobileMenu = document.getElementById("mobile-menu");

  menuToggle.addEventListener("click", () => {
    mobileMenu.classList.toggle("hidden");
  })

  // Close menu if clicking outside
  document.addEventListener("click", (event) => {
    if (!menuToggle.contains(event.target) && !mobileMenu.contains(event.target)) {
      mobileMenu.classList.add("hidden");
    }
  });
  </script>
</body>
</html>
